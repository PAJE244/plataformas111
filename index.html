<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100% PLATAFORMAS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:linear-gradient(135deg,#0a0a0a,#1a0000);color:#fff;min-height:100vh;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-card{background:#111;padding:30px;border-radius:15px;width:90%;max-width:400px;text-align:center;}
input{width:100%;padding:12px;margin:10px 0;border:none;border-radius:8px;}
button{padding:12px;width:100%;border:none;border-radius:8px;background:#ff1a1a;color:#fff;font-weight:bold;cursor:pointer;}

#adminPanel,#mainPlatform{display:none;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <h2>Entrar</h2>
    <input type="email" id="emailInput" placeholder="Seu e-mail">
    <button onclick="attemptLogin()">ENTRAR</button>
    <p id="loginError"></p>
    <br>
    <button onclick="openAdmin()">⚙ Admin</button>
  </div>
</div>

<!-- ADMIN -->
<div id="adminPanel">
  <div class="login-card">
    <h2>Painel Admin</h2>
    <input type="password" id="adminPassInput" placeholder="Senha">
    <button onclick="verifyAdmin()">Entrar</button>

    <div id="adminContent" style="display:none;">
      <input type="email" id="newEmailInput" placeholder="Adicionar email">
      <button onclick="addEmail()">Adicionar</button>
      <div id="emailList"></div>
    </div>

    <button onclick="location.reload()">Voltar</button>
  </div>
</div>

<!-- MAIN -->
<div id="mainPlatform">
  <div class="login-card">
    <h1>Bem-vindo</h1>
    <p id="loggedEmailDisplay"></p>
    <button onclick="logout()">Sair</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBiUKpL3JZ4Dm4Ie29YwDIgV05Ly-ynOjQ",
  authDomain: "plata-595b5.firebaseapp.com",
  projectId: "plata-595b5",
  storageBucket: "plata-595b5.firebasestorage.app",
  messagingSenderId: "647145488423",
  appId: "1:647145488423:web:e1f38ab5c5da9d986e4e02",
  measurementId: "G-9N035WHD8V"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
window.deleteDoc = deleteDoc;
window.doc = doc;
</script>

<script>
const ADMIN_PASSWORD = "macaco";

/* LOGIN */
async function attemptLogin(){
  const email = document.getElementById("emailInput").value.toLowerCase();
  const query = await getDocs(collection(db,"emails"));

  let autorizado = false;

  query.forEach(docSnap=>{
    if(docSnap.data().email === email){
      autorizado = true;
    }
  });

  if(autorizado){
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("mainPlatform").style.display="block";
    document.getElementById("loggedEmailDisplay").innerText=email;
  }else{
    document.getElementById("loginError").innerText="E-mail não autorizado";
  }
}

/* ADMIN */
function openAdmin(){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("adminPanel").style.display="block";
}

function verifyAdmin(){
  const pass = document.getElementById("adminPassInput").value;
  if(pass === ADMIN_PASSWORD){
    document.getElementById("adminContent").style.display="block";
    loadEmails();
  }else{
    alert("Senha errada");
  }
}

/* FIREBASE */
async function addEmail(){
  const email = document.getElementById("newEmailInput").value.toLowerCase();
  if(!email) return;

  await addDoc(collection(db,"emails"),{email:email});
  document.getElementById("newEmailInput").value="";
  loadEmails();
}

async function loadEmails(){
  const list = document.getElementById("emailList");
  list.innerHTML="";

  const query = await getDocs(collection(db,"emails"));
  query.forEach(d=>{
    const div = document.createElement("div");
    div.innerHTML = d.data().email + 
      ' <button onclick="removeEmail(\''+d.id+'\')">Remover</button>';
    list.appendChild(div);
  });
}

async function removeEmail(id){
  await deleteDoc(doc(db,"emails",id));
  loadEmails();
}

/* LOGOUT */
function logout(){
  location.reload();
}
</script>

</body>
</html>
